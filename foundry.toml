[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "shanghai"   # drop to "paris" if Atlantic rejects PUSH0 on deploy
optimizer = true
optimizer_runs = 200
fuzz = { runs = 512 }
invariant = { runs = 256, depth = 32, fail_on_revert = false }

[rpc_endpoints]
atlantic = "https://atlantic.dplabs-internal.com"
